<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>

    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: white;
            margin: 0;
        }

        .container {
            max-width: 1000px;
            margin: auto;
            padding: 20px;
        }

        h1 {
            text-align: center;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }

        .card {
            background: #1e293b;
            padding: 20px;
            border-radius: 12px;
        }

        .card h2 {
            margin-top: 0;
        }

        li {
            margin: 5px 0;
        }

        .top-bar {
            text-align: center;
            margin-bottom: 20px;
        }

        a {
            color: #60a5fa;
            text-decoration: none;
        }
    </style>
</head>

<body>

<div class="container">
    <h1>📊 Dashboard</h1>

    <div class="top-bar">
        <a href="/">⬅ Back to Chat</a>
    </div>

    <div class="grid">

        <div class="card">
            <h2>📋 Tasks</h2>
            <ul>
                {% for task in tasks %}
                    <li>{{ task }}</li>
                {% endfor %}
            </ul>
        </div>

        <div class="card">
            <h2>📅 Events</h2>
            <ul>
                {% for event in events %}
                    <li>{{ event }}</li>
                {% endfor %}
            </ul>
        </div>

        <div class="card">
            <h2>📝 Notes</h2>
            <ul>
                {% for note in notes %}
                    <li>{{ note }}</li>
                {% endfor %}
            </ul>
        </div>

    </div>
</div>

</body>
</html>
