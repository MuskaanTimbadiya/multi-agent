<!DOCTYPE html>
<html>

<head>
    <title>Smart Task Manager AI</title>

    <style>
        body {
            margin: 0;
            font-family: "Segoe UI", sans-serif;
            background: #0f172a;
            color: white;
        }

        .container {
            max-width: 800px;
            margin: auto;
            padding: 20px;
        }

        h1 {
            text-align: center;
            margin-bottom: 5px;
        }

        .subtitle {
            text-align: center;
            opacity: 0.6;
            margin-bottom: 20px;
        }

        .chat-box {
            height: 450px;
            overflow-y: auto;
            padding: 15px;
            border-radius: 15px;
            background: #1e293b;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.3);
        }

        .message {
            padding: 12px 15px;
            margin: 10px 0;
            border-radius: 12px;
            max-width: 70%;
            line-height: 1.4;
        }

        .user {
            background: #2563eb;
            margin-left: auto;
            text-align: right;
        }

        .bot {
            background: #334155;
            margin-right: auto;
        }

        .input-box {
            display: flex;
            margin-top: 15px;
        }

        input {
            flex: 1;
            padding: 14px;
            border-radius: 10px;
            border: none;
            outline: none;
            background: #1e293b;
            color: white;
        }

        button {
            padding: 14px 18px;
            margin-left: 10px;
            border-radius: 10px;
            border: none;
            background: #2563eb;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background: #1d4ed8;
        }

        #typing {
            font-style: italic;
            opacity: 0.7;
            animation: blink 1s infinite;
        }

        @keyframes blink {
            0% {
                opacity: 0.3;
            }

            50% {
                opacity: 1;
            }

            100% {
                opacity: 0.3;
            }
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>🚀 Smart Task Manager AI</h1>
        <div class="subtitle">Your intelligent multi-agent assistant</div>


        <div style="text-align:center; margin-bottom:10px;">
            <a href="/dashboard" style="color:#60a5fa;">📊 View Dashboard</a>
        </div>

        <div class="chat-box" id="chatBox">

            {% if chat_history %}
            {% for role, message in chat_history %}
            <div class="message {{ role }}">
                {% if role == 'user' %}
                👤 {{ message }}
                {% else %}
                🤖 {{ message }}
                {% endif %}
            </div>
            {% endfor %}
            {% endif %}

        </div>

        <form action="/ask" method="post" class="input-box">
            <input type="text" name="query" placeholder="Ask me anything..." required>
            <button type="submit">Send</button>
        </form>
    </div>

    <script>
        const chatBox = document.getElementById("chatBox");

        // Auto scroll
        chatBox.scrollTop = chatBox.scrollHeight;

        // Typing effect for last bot message
        function typeMessage(element, text, speed = 20) {
            let i = 0;
            element.innerHTML = "";
            function typing() {
                if (i < text.length) {
                    element.innerHTML += text.charAt(i);
                    i++;
                    setTimeout(typing, speed);
                }
            }
            typing();
        }

        // Find last bot message
        const messages = document.querySelectorAll(".bot");
        if (messages.length > 0) {
            const lastMessage = messages[messages.length - 1];
            const fullText = lastMessage.innerText;
            typeMessage(lastMessage, fullText);
        }

        // Show typing indicator on submit
        const form = document.querySelector("form");
        form.addEventListener("submit", function () {
            const typingDiv = document.createElement("div");
            typingDiv.className = "message bot";
            typingDiv.id = "typing";
            typingDiv.innerHTML = "🤖 Typing...";
            chatBox.appendChild(typingDiv);

            chatBox.scrollTop = chatBox.scrollHeight;
        });
    </script>

</body>

</html>
