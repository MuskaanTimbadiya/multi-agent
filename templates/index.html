<!DOCTYPE html>
<html>
<head>
<title>NeuraFlow AI</title>

<style>
body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    background: linear-gradient(135deg, #0f172a, #1e1b4b, #020617);
    background-size: 400% 400%;
    animation: gradientBG 12s ease infinite;
    color: white;
    display: flex;
}

@keyframes gradientBG {
    0% { background-position: 0% }
    50% { background-position: 100% }
    100% { background-position: 0% }
}

/* Sidebar */
.sidebar {
    width: 240px;
    background: rgba(15, 23, 42, 0.6);
    backdrop-filter: blur(15px);
    padding: 20px;
    height: 100vh;
    border-right: 1px solid rgba(255,255,255,0.05);
}

.logo {
    font-size: 22px;
    font-weight: bold;
    color: #a78bfa;
    margin-bottom: 30px;
}

.nav a {
    display: block;
    color: #9ca3af;
    text-decoration: none;
    margin: 12px 0;
    transition: 0.3s;
}

.nav a:hover {
    color: white;
    transform: translateX(5px);
}

/* Main */
.main {
    flex: 1;
    padding: 30px;
}

h1 {
    text-align: center;
    color: #c4b5fd;
}

/* Chat */
.chat-box {
    background: rgba(17, 24, 39, 0.6);
    backdrop-filter: blur(20px);
    border-radius: 16px;
    padding: 20px;
    height: 420px;
    overflow-y: auto;
    border: 1px solid rgba(255,255,255,0.05);
}

.message {
    margin: 10px 0;
    padding: 12px 16px;
    border-radius: 14px;
    max-width: 70%;
    animation: fadeIn 0.4s ease;
}

.user {
    background: linear-gradient(135deg, #8b5cf6, #6366f1);
    margin-left: auto;
}

.bot {
    background: rgba(255,255,255,0.05);
    margin-right: auto;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
}

/* Input */
.input-box {
    display: flex;
    margin-top: 15px;
}

input {
    flex: 1;
    padding: 14px;
    border-radius: 12px;
    border: none;
    background: rgba(255,255,255,0.05);
    color: white;
}

button {
    margin-left: 10px;
    padding: 14px 18px;
    border-radius: 12px;
    border: none;
    background: linear-gradient(135deg, #8b5cf6, #6366f1);
    color: white;
    cursor: pointer;
    transition: 0.3s;
    box-shadow: 0 0 15px rgba(139,92,246,0.4);
}

button:hover {
    transform: scale(1.05);
}

/* Typing */
.typing {
    color: #9ca3af;
    font-style: italic;
    animation: blink 1s infinite;
}

@keyframes blink {
    50% { opacity: 0.5; }
}
</style>
</head>

<body>

<div class="sidebar">
    <div class="logo">⚡ NeuraFlow</div>

    <div class="nav">
        <a href="/">💬 Chat</a>
        <a href="/dashboard">📊 Dashboard</a>
    </div>
</div>

<div class="main">
    <h1>NeuraFlow AI</h1>

    <div class="chat-box" id="chatBox">

        {% for role, message in chat_history %}
        <div class="message {{ role }}">
            {% if role == 'user' %}
                👤 {{ message }}
            {% else %}
                🤖 {{ message }}
            {% endif %}
        </div>
        {% endfor %}

        <div id="typing" class="typing" style="display:none;">AI is thinking...</div>

    </div>

    <form action="/ask" method="post" class="input-box" onsubmit="showTyping()">
        <input type="text" name="query" placeholder="Ask anything..." required>
        <button>Send</button>
    </form>

</div>

<script>
function showTyping() {
    document.getElementById("typing").style.display = "block";
}
const chatBox = document.getElementById("chatBox");
chatBox.scrollTop = chatBox.scrollHeight;
</script>

</body>
</html>
